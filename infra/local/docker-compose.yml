services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: scratch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 2s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5

  app:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SCRATCH_APP_ENV: dev
      SCRATCH_HTTP_ADDR: :8080
      SCRATCH_LOG_LEVEL: info
      SCRATCH_POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/scratch?sslmode=disable
      SCRATCH_RUN_MIGRATIONS: "true"
      SCRATCH_VALKEY_ADDR: valkey:6379
      SCRATCH_VALKEY_USERNAME: ""
      SCRATCH_VALKEY_PASSWORD: ""
      SCRATCH_VALKEY_DB: "0"
      SCRATCH_AUTH_ENABLED: "false"
      SCRATCH_AUTH_JWKS_ENDPOINT: ""
      SCRATCH_AUTH_JWKS_REFRESH_MIN: "10"
      SCRATCH_RATE_LIMIT_PER_SECOND: "0"
      SCRATCH_RATE_LIMIT_TTL_SEC: "300"
      SCRATCH_TELEMETRY_ENABLED: "false"
      SCRATCH_TELEMETRY_OTLP_ENDPOINT: ""
      SCRATCH_TLS_ENABLED: "false"
      SCRATCH_TLS_CERT_FILE: ""
      SCRATCH_TLS_KEY_FILE: ""
      SCRATCH_CORS_ORIGINS: "*"
      SCRATCH_READ_TIMEOUT_SEC: "10"
      SCRATCH_WRITE_TIMEOUT_SEC: "30"
      SCRATCH_FEATURE_CACHE_TTL_SEC: "30"
      SCRATCH_FEATURE_SOFT_DELETE: "true"
      SCRATCH_FEATURE_AUDIT: "false"
      SCRATCH_FEATURE_AUTH: "false"
      SCRATCH_FEATURE_TELEMETRY: "false"
      SCRATCH_FEATURE_VALKEY_CACHING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
