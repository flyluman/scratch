apiVersion: apps/v1
kind: Deployment
metadata:
  name: scratch
  labels:
    app: scratch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scratch
  template:
    metadata:
      labels:
        app: scratch
    spec:
      containers:
        - name: scratch
          image: scratch:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: scratch-config
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
